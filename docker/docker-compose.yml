services:
  mysql:
    image: mysql:8.0
    container_name: teamsky-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: teamsky
      MYSQL_USER: teamsky
      MYSQL_PASSWORD: teamsky
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: study/boot/Dockerfile
    container_name: teamsky-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/teamsky?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: teamsky
      SPRING_DATASOURCE_PASSWORD: teamsky
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
